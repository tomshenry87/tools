<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firmware Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=EB+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#f7f7f7}body.dark{background:#1a1a1a}#root{min-height:100vh}#loading{color:#707070;font-family:'Inter',sans-serif;text-align:center;padding:60px;font-size:16px}</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"><div id="loading">Loading Firmware Dashboard...</div></div>
<script type="text/babel">
const {useState,useMemo,useCallback,useRef,useEffect}=React;

const LIGHT={bg:"#f7f7f7",surface:"#ffffff",surfaceAlt:"#f0f0f0",surfaceHi:"#e2e2e2",border:"#e2e2e2",borderHi:"#ccc",text:"#1a1a1a",textBright:"#000000",textMuted:"#707070",textDim:"#999",accent:"#00693e",accentDim:"rgba(0,105,62,0.08)",accentGlow:"rgba(0,105,62,0.15)",green:"#00693e",greenDim:"rgba(0,105,62,0.08)",amber:"#b45309",amberDim:"rgba(180,83,9,0.08)",red:"#9d162e",redDim:"rgba(157,22,46,0.06)",teal:"#003c73",tealDim:"rgba(0,60,115,0.08)",indigo:"#8a6996",indigoDim:"rgba(138,105,150,0.08)",pink:"#d94415",pinkDim:"rgba(217,68,21,0.08)",orange:"#b45309",orangeDim:"rgba(180,83,9,0.08)",cyan:"#267aba",cyanDim:"rgba(38,122,186,0.08)"};
const DARK={bg:"#1a1a1a",surface:"#242424",surfaceAlt:"#2e2e2e",surfaceHi:"#3a3a3a",border:"#3a3a3a",borderHi:"#4a4a4a",text:"#e2e2e2",textBright:"#f7f7f7",textMuted:"#999",textDim:"#666",accent:"#00693e",accentDim:"rgba(0,105,62,0.15)",accentGlow:"rgba(0,105,62,0.25)",green:"#4ade80",greenDim:"rgba(74,222,128,0.12)",amber:"#fbbf24",amberDim:"rgba(251,191,36,0.12)",red:"#f87171",redDim:"rgba(248,113,113,0.10)",teal:"#67b8e3",tealDim:"rgba(103,184,227,0.12)",indigo:"#b89cc7",indigoDim:"rgba(184,156,199,0.12)",pink:"#f0764a",pinkDim:"rgba(240,118,74,0.12)",orange:"#fbbf24",orangeDim:"rgba(251,191,36,0.12)",cyan:"#5ba3d9",cyanDim:"rgba(91,163,217,0.12)"};
const DTYPES_LIGHT={camera:{icon:"\u{1F4F7}",label:"Camera",color:"#267aba",bg:"rgba(38,122,186,0.08)"},switch:{icon:"\u{1F500}",label:"Switch",color:"#00693e",bg:"rgba(0,105,62,0.08)"},projector:{icon:"\u{1F4FD}",label:"Projector",color:"#8a6996",bg:"rgba(138,105,150,0.08)"},display:{icon:"\u{1F5A5}",label:"Display",color:"#d94415",bg:"rgba(217,68,21,0.08)"},router:{icon:"\u{1F310}",label:"Router",color:"#b45309",bg:"rgba(180,83,9,0.08)"},pdu:{icon:"\u{1F50C}",label:"PDU",color:"#003c73",bg:"rgba(0,60,115,0.08)"},microphone:{icon:"\u{1F399}",label:"Microphone",color:"#643c20",bg:"rgba(100,60,32,0.08)"},ups:{icon:"\u{1F50B}",label:"UPS",color:"#9d162e",bg:"rgba(157,22,46,0.08)"},relay:{icon:"\u{1F504}",label:"Relay",color:"#4a7c59",bg:"rgba(74,124,89,0.08)"},dsp:{icon:"\u{1F3B5}",label:"DSP",color:"#5b4a8a",bg:"rgba(91,74,138,0.08)"},unknown:{icon:"?",label:"Device",color:"#707070",bg:"rgba(112,112,112,0.08)"}};
const DTYPES_DARK={camera:{icon:"\u{1F4F7}",label:"Camera",color:"#67b8e3",bg:"rgba(103,184,227,0.12)"},switch:{icon:"\u{1F500}",label:"Switch",color:"#4ade80",bg:"rgba(74,222,128,0.12)"},projector:{icon:"\u{1F4FD}",label:"Projector",color:"#b89cc7",bg:"rgba(184,156,199,0.12)"},display:{icon:"\u{1F5A5}",label:"Display",color:"#f0764a",bg:"rgba(240,118,74,0.12)"},router:{icon:"\u{1F310}",label:"Router",color:"#fbbf24",bg:"rgba(251,191,36,0.12)"},pdu:{icon:"\u{1F50C}",label:"PDU",color:"#5ba3d9",bg:"rgba(91,163,217,0.12)"},microphone:{icon:"\u{1F399}",label:"Microphone",color:"#c4956e",bg:"rgba(196,149,110,0.12)"},ups:{icon:"\u{1F50B}",label:"UPS",color:"#f87171",bg:"rgba(248,113,113,0.12)"},relay:{icon:"\u{1F504}",label:"Relay",color:"#6fcf8a",bg:"rgba(111,207,138,0.12)"},dsp:{icon:"\u{1F3B5}",label:"DSP",color:"#a78bdb",bg:"rgba(167,139,219,0.12)"},unknown:{icon:"?",label:"Device",color:"#999",bg:"rgba(153,153,153,0.1)"}};
const CHART_COLORS=["#267aba","#00693e","#8a6996","#d94415","#b45309","#003c73","#643c20","#9d162e"];
const M="'Inter','Helvetica Neue',sans-serif";
const S="'Inter','Helvetica Neue',sans-serif";
var T=LIGHT;
var DTYPES=DTYPES_LIGHT;

function extractBR(host){if(!host)return{building:"Unknown",room:"?"};var p=host.split(".")[0].split("-");if(p[0]==="cts")p=p.slice(1);if(p.length<2)return{building:(p[0]||"?").charAt(0).toUpperCase()+(p[0]||"").slice(1),room:"?"};var bldg,rm;if(/^\d+$/.test(p[0])&&p.length>=3){bldg=p[0]+"-"+p[1].charAt(0).toUpperCase()+p[1].slice(1);rm=p[2]||"?";}else{bldg=p[0].charAt(0).toUpperCase()+p[0].slice(1);rm=p[1]||"?";}var renames={"4-Currier":"Currier04","Osher":"Court01"};if(renames[bldg])bldg=renames[bldg];return{building:bldg,room:rm};}
function hostShort(h){var s=h.split(".")[0];return s.replace(/^cts-/,"");}

function norm(raw){
  const host=raw.host||"";const{building,room}=extractBR(host);const type=raw._type||"unknown";
  var fw=raw.firmware_version||raw.firmware||raw.routeros_version||"N/A";
  if(type==="ups")fw=raw.agent_firmware||"N/A";
  const d={host,building,room,status:raw.status||"unknown",error:raw.error||null,_type:type,_source:raw._source||"",model:raw.model||raw.product_name||raw.product_family||"N/A",serial:raw.serial||raw.serial_number||"N/A",mac:raw.mac||raw.mac_address||"N/A",firmware:fw};
  if(type==="camera"){d.temp_c=raw.temperature_c||raw.temp_c||null;d.build_date=raw.build_date||null;}
  else if(type==="projector"){d.manufacturer=raw.manufacturer||"";d.lamp_hours=raw.lamp_hours_total??null;d.power_status=raw.power_status||"";}
  else if(type==="display"){d.device_name=raw.device_name||"";d.power_saving=raw.power_saving_mode||"";}
  else if(type==="router"){d.routeros=raw.routeros_version||"";d.poe_w=raw.poe_out_consumption_w??null;d.board_temp_c=raw.board_temperature1_c??null;}
  else if(type==="switch"){d.cpu_temp=raw.cpu_temp||null;d.cpu_temp_value=raw.cpu_temp_value??null;d.poe_consumed=raw.poe_consumed||null;d.build_date=raw.build_date||null;}
  else if(type==="pdu"){d.manufacturer=raw.manufacturer||"";d.device_name=raw.device_name||"";d.outlets=raw.outlets||[];}
  else if(type==="ups"){d.battery_status=raw.battery_status||"N/A";d.battery_pct=raw.battery_capacity_pct??null;d.runtime=raw.runtime_remaining||"N/A";d.replace_indicator=raw.replace_indicator||"N/A";}
  else if(type==="relay"){d.relay_ports=raw.relay_port_count??null;d.relay_states=raw.relay_states||[];}
  else if(type==="dsp"){d.device_name=raw.device_name||"";d.fault_status=raw.fault_status||"N/A";d.fault_details=raw.fault_details||[];}
  return d;
}

function Badge({children,color,bg,style:s}){return <span style={{display:"inline-block",fontSize:13,fontWeight:600,fontFamily:S,padding:"3px 10px",borderRadius:4,background:bg,color,lineHeight:"20px",whiteSpace:"nowrap",...s}}>{children}</span>;}
function DBadge({type}){const c=DTYPES[type]||DTYPES.unknown;return <Badge color={c.color} bg={c.bg}>{c.icon} {c.label}</Badge>;}
const stColor=s=>s==="success"?T.green:s==="auth_error"?T.amber:T.red;
const tmpColor=t=>{const v=parseFloat(t);return isNaN(v)?T.textDim:v>=50?T.red:v>=45?T.amber:T.green;};
const lampColor=h=>h>=10000?T.red:h>=5000?T.amber:T.green;

function TBar({value,max=65,label="C"}){const v=parseFloat(value);if(isNaN(v))return <span style={{color:T.textDim,fontSize:13,fontFamily:S}}>—</span>;const pct=Math.min((v/max)*100,100);const c=tmpColor(v);
  return <div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:56,height:6,borderRadius:3,background:T.surfaceHi,overflow:"hidden"}}><div style={{width:`${pct}%`,height:"100%",borderRadius:3,background:c}}/></div><span style={{fontFamily:S,fontSize:13,fontWeight:600,color:c}}>{v.toFixed(1)}°{label}</span></div>;}

function DDetail({d}){
  const common=<span style={{color:T.textMuted,fontSize:13,fontFamily:M}}>{d.model!=="N/A"?d.model:""}</span>;
  const fw=d.firmware!=="N/A"?<span style={{color:T.green,fontSize:13,fontFamily:M}}>fw {d.firmware}</span>:null;
  switch(d._type){
    case"camera":return <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>{common}{fw}{d.temp_c&&<TBar value={d.temp_c}/>}</div>;
    case"projector":return <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}><span style={{color:T.textMuted,fontSize:13,fontFamily:M}}>{d.manufacturer} {d.model}</span><Badge color={d.power_status==="Standby"?T.amber:T.textMuted} bg={d.power_status==="Standby"?T.amberDim:"rgba(55,72,96,0.2)"}>{d.power_status||"?"}</Badge>{d.lamp_hours!=null&&<span style={{fontFamily:M,fontSize:13,fontWeight:600,color:lampColor(d.lamp_hours)}}>{d.lamp_hours.toLocaleString()}h</span>}</div>;
    case"display":return <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>{common}{fw}</div>;
    case"router":return <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>{common}<span style={{color:T.green,fontSize:13,fontFamily:M}}>ROS {d.routeros}</span>{d.poe_w!=null&&<span style={{fontFamily:M,fontSize:13,color:T.orange}}>⚡{d.poe_w}W</span>}{d.board_temp_c!=null&&<TBar value={d.board_temp_c}/>}</div>;
    case"switch":{const isMT=d.cpu_temp!=null;return <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>{common}{fw}{isMT&&d.cpu_temp_value&&<TBar value={((d.cpu_temp_value-32)*5/9).toFixed(1)}/>}{isMT&&d.poe_consumed&&<span style={{fontFamily:M,fontSize:13,color:T.orange}}>⚡{d.poe_consumed}</span>}</div>;}
    case"pdu":{const on=(d.outlets||[]).filter(o=>o.status==="on").length;return <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}><span style={{color:T.textMuted,fontSize:13,fontFamily:M}}>{d.manufacturer} {d.model}</span>{fw}<Badge color={T.green} bg={T.greenDim}>{on}/{d.outlets.length} on</Badge></div>;}
    case"ups":{const batColor=d.battery_status==="normal"?T.green:d.battery_status==="low"?T.red:T.amber;const replColor=d.replace_indicator==="ok"?T.green:d.replace_indicator==="replace"?T.red:T.textMuted;return <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>{common}{fw}{d.battery_pct!=null&&<span style={{fontFamily:S,fontSize:13,fontWeight:600,color:batColor}}>{d.battery_pct}%</span>}{d.runtime!=="N/A"&&<span style={{fontFamily:S,fontSize:13,color:T.textMuted}}>{d.runtime}</span>}{d.battery_status!=="N/A"&&<Badge color={batColor} bg={d.battery_status==="normal"?T.greenDim:T.redDim}>{d.battery_status}</Badge>}{d.replace_indicator==="replace"&&<Badge color={T.red} bg={T.redDim}>replace battery</Badge>}</div>;}
    case"relay":{return <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>{common}{fw}{d.relay_ports&&<span style={{fontFamily:S,fontSize:13,color:T.textMuted}}>{d.relay_ports} ports</span>}</div>;}
    case"dsp":{const faultColor=d.fault_status==="OK"?T.green:d.fault_status==="FAULT"?T.red:T.textMuted;return <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>{common}{fw}<Badge color={faultColor} bg={d.fault_status==="OK"?T.greenDim:d.fault_status==="FAULT"?T.redDim:"transparent"}>{d.fault_status}</Badge>{d.fault_details&&d.fault_details.length>0&&<span style={{fontSize:12,color:T.red}}>{d.fault_details[0]}</span>}</div>;}
    default:return <div style={{display:"flex",gap:10,alignItems:"center"}}>{common}{fw}</div>;
  }
}
function HBarChart({data,width=600,barHeight=18,gap=4}){const maxVal=Math.max(...data.map(d=>d.total),1);const labelW=90;const chartW=width-labelW-40;const h=data.length*(barHeight+gap)+10;
  return <svg width="100%" viewBox={`0 0 ${width} ${h}`} style={{fontFamily:S}}>{data.map((d,i)=>{const y=i*(barHeight+gap)+5;const onW=(d.online/maxVal)*chartW;const errW=(d.errors/maxVal)*chartW;
    return <g key={d.name}><text x={labelW-6} y={y+barHeight/2+4} textAnchor="end" fill={T.textMuted} fontSize={10}>{d.name}</text><rect x={labelW} y={y} width={onW} height={barHeight} rx={2} fill={T.green} fillOpacity={0.7}/><rect x={labelW+onW} y={y} width={errW} height={barHeight} rx={errW>0?2:0} fill={T.red} fillOpacity={0.7}/><text x={labelW+onW+errW+6} y={y+barHeight/2+4} fill={T.textDim} fontSize={10}>{d.total}</text></g>;})}</svg>;}
function ProgBar({label,value,max,color,icon}){const pct=max>0?(value/max)*100:0;
  return <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>{icon&&<span style={{fontSize:13,width:18}}>{icon}</span>}<span style={{fontFamily:M,fontSize:13,color,minWidth:70}}>{label}</span><div style={{flex:1,height:5,borderRadius:3,background:T.surfaceHi}}><div style={{width:`${pct}%`,height:"100%",borderRadius:3,background:color}}/></div><span style={{fontFamily:M,fontSize:13,color:T.textMuted,minWidth:25,textAlign:"right"}}>{value}</span></div>;}

// Auto-refresh interval (ms)
const REFRESH_INTERVAL = 60000;

function FwStatusPie({devices,targetFw,large}){
  if(!devices||devices.length===0)return null;
  var naC="N/A (Class 1)";
  var okCount=0,outdatedCount=0,offlineCount=0,noTargetCount=0;
  devices.forEach(function(d){
    if(d.status!=="success"){offlineCount++;return;}
    var t=targetFw[d._type];
    var hasT=t&&Array.isArray(t)&&t.length>0&&!t.includes("*");
    if(!hasT){noTargetCount++;return;}
    if(d.firmware==="N/A"||d.firmware===naC||t.includes(d.firmware))okCount++;
    else outdatedCount++;
  });
  var total=devices.length;
  var segments=[
    {label:"OK",count:okCount,color:T.green},
    {label:"Outdated",count:outdatedCount,color:T.amber},
    {label:"Offline",count:offlineCount,color:T.red},
    {label:"No Target",count:noTargetCount,color:T.textDim}
  ].filter(function(s){return s.count>0;});
  var sz=large?280:180,scx=sz/2,scy=sz/2,sr=large?115:72,sa=-90;
  var arcs=segments.map(function(seg){
    var ang=(seg.count/total)*360;
    var ea=sa+ang,la=ang>180?1:0;
    var rad=function(a){return a*Math.PI/180;};
    var x1=scx+sr*Math.cos(rad(sa)),y1=scy+sr*Math.sin(rad(sa));
    var x2=scx+sr*Math.cos(rad(ea)),y2=scy+sr*Math.sin(rad(ea));
    var p=ang>=359.9
      ?"M"+(scx-sr)+","+scy+"A"+sr+","+sr+",0,1,1,"+(scx+sr)+","+scy+"A"+sr+","+sr+",0,1,1,"+(scx-sr)+","+scy
      :"M"+scx+","+scy+"L"+x1+","+y1+"A"+sr+","+sr+",0,"+la+",1,"+x2+","+y2+"Z";
    sa=ea;
    return {label:seg.label,count:seg.count,color:seg.color,path:p,pct:Math.round(seg.count/total*100)};
  });
  var innerR=large?58:38;
  var titleFs=large?36:26;
  var subFs=large?14:12;
  var subY=large?18:15;
  return <div style={{background:T.surface,border:"1px solid "+T.border,borderRadius:8,padding:large?24:20,marginBottom:large?0:14}}>
    {large&&<div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18}}>
      <span style={{fontSize:22}}>📊</span>
      <span style={{fontSize:20,fontWeight:700,color:T.textBright,fontFamily:"'EB Garamond',Georgia,serif"}}>Firmware Status</span>
      <span style={{fontSize:15,color:T.textMuted,fontFamily:S}}>{total} devices</span>
    </div>}
    <div style={{display:"flex",gap:large?24:20,alignItems:"center"}}>
      <svg width={sz} height={sz} viewBox={"0 0 "+sz+" "+sz}>
        {arcs.map(function(a,i){return <path key={i} d={a.path} fill={a.color} opacity={0.85} stroke={T.surface} strokeWidth={large?2:1.5}/>;})}
        <circle cx={scx} cy={scy} r={innerR} fill={T.surface}/>
        <text x={scx} y={scy-4} textAnchor="middle" fill={T.textBright} fontSize={titleFs} fontWeight={700} fontFamily={S}>{total}</text>
        <text x={scx} y={scy+subY} textAnchor="middle" fill={T.textMuted} fontSize={subFs} fontFamily={S}>{large?"total devices":"shown"}</text>
      </svg>
      <div style={{display:"flex",gap:large?20:28,flexWrap:"wrap",flex:1,flexDirection:large?"column":"row"}}>
        {arcs.map(function(a,i){return <div key={i} style={{display:"flex",alignItems:"center",gap:large?12:10}}>
          <div style={{width:large?16:14,height:large?16:14,borderRadius:large?4:3,background:a.color}}/>
          <div>
            <div style={{fontSize:large?30:28,fontWeight:700,color:a.color,lineHeight:1}}>{a.count}</div>
            <div style={{fontSize:large?15:14,color:T.textMuted}}>{a.label} ({a.pct}%)</div>
          </div>
        </div>;})}
      </div>
    </div>
    {!large&&<div style={{marginTop:10,fontSize:16,color:T.textMuted,fontWeight:500,textAlign:"right"}}>Firmware Status</div>}
  </div>;
}

function FleetConsole(){
  const[dark,setDark]=useState(false);
  T=dark?DARK:LIGHT;
  DTYPES=dark?DTYPES_DARK:DTYPES_LIGHT;

  useEffect(()=>{document.body.className=dark?"dark":"";},[dark]);

  const[allDevs,setAllDevs]=useState([]);
  const[fMeta,setFMeta]=useState([]);
  const[loading,setLoading]=useState(true);
  const[lastUpdate,setLastUpdate]=useState(null);
  const[error,setError]=useState(null);
  const[view,setView]=useState("hierarchy");
  const[expB,setExpB]=useState(new Set());
  const[expR,setExpR]=useState(new Set());
  const[search,setSearch]=useState("");
  const[fType,setFType]=useState("all");
  const[fStatus,setFStatus]=useState("all");
  const[fBldg,setFBldg]=useState("all");
  const[fFwStatus,setFFwStatus]=useState("all");
  const[sortCol,setSortCol]=useState("building");
  const[sortDir,setSortDir]=useState("asc");
  const[selectedBldg,setSelectedBldg]=useState(null);
  const[targetFw,setTargetFw]=useState({});
  const[fwSaving,setFwSaving]=useState(false);
  const[logoErr,setLogoErr]=useState(false);

  const[userRole,setUserRole]=useState(null);
  const[userName,setUserName]=useState("");

  // Fetch data from server
  const fetchData=useCallback(async()=>{
    try{
      const res=await fetch("/api/data");
      if(res.status===401){window.location.href="/login";return;}
      const data=await res.json();
      const devs=data.devices.map(d=>norm(d));
      setAllDevs(devs);
      setFMeta(data.sources||[]);
      if(data.target_firmware)setTargetFw(prev=>{
        const merged={...data.target_firmware};
        Object.keys(prev).forEach(k=>{if(prev[k]&&prev[k].length)merged[k]=prev[k];});
        return merged;
      });
      if(data.role)setUserRole(data.role);
      if(data.user)setUserName(data.user);
      setLastUpdate(new Date());
      setError(null);
      setLoading(false);
    }catch(err){
      setError("Failed to load data from server");
      setLoading(false);
    }
  },[]);

  // Auto-load on mount + refresh interval
  useEffect(()=>{
    fetchData();
    const interval=setInterval(fetchData,REFRESH_INTERVAL);
    return()=>clearInterval(interval);
  },[fetchData]);

  const isAdmin=userRole==="admin";

  // Save target firmware to server (admin only)
  const saveTargetFw=useCallback(async(targets)=>{
    setTargetFw(targets);
    if(!isAdmin)return;
    setFwSaving(true);
    try{const res=await fetch("/api/target-firmware",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(targets)});if(res.status===401)window.location.href="/login";}catch(e){}
    setTimeout(()=>setFwSaving(false),800);
  },[isAdmin]);

  const stats=useMemo(()=>{const on=allDevs.filter(d=>d.status==="success").length;const types={};allDevs.forEach(d=>{types[d._type]=(types[d._type]||0)+1;});return{total:allDevs.length,online:on,errors:allDevs.length-on,types,buildings:new Set(allDevs.map(d=>d.building)).size,rooms:new Set(allDevs.map(d=>`${d.building}::${d.room}`)).size};},[allDevs]);
  const typeOpts=useMemo(()=>[...new Set(allDevs.map(d=>d._type))].sort(),[allDevs]);

            <div style={{background:T.redDim,border:"1px solid rgba(239,68,68,0.25)",borderRadius:7,padding:"8px 14px",display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:18,fontWeight:700,color:T.red}}>{attStats.offline}</span><span style={{fontSize:13,color:T.red,fontWeight:600}}>Offline / Error</span></div>
            <div style={{background:T.amberDim,border:"1px solid rgba(245,158,11,0.25)",borderRadius:7,padding:"8px 14px",display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:18,fontWeight:700,color:T.amber}}>{attStats.outdated}</span><span style={{fontSize:13,color:T.amber,fontWeight:600}}>Outdated Firmware</span></div>
            <div style={{background:T.surfaceAlt,border:`1px solid ${T.border}`,borderRadius:7,padding:"8px 14px",display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:18,fontWeight:700,color:T.textBright}}>{attStats.total}</span><span style={{fontSize:13,color:T.textMuted,fontWeight:600}}>Total Attention</span></div>
          </div>
          {attStats.total===0?<div style={{textAlign:"center",padding:"40px 20px",color:T.green}}><div style={{fontSize:32,marginBottom:8}}>✅</div><div style={{fontSize:17,fontWeight:600}}>All clear!</div><div style={{fontSize:13,color:T.textMuted,marginTop:4}}>{Object.values(targetFw).some(v=>Array.isArray(v)&&v.length>0)?"All devices online and on accepted firmware.":"Select accepted firmware versions above to check."}</div></div>
          :<div>
            <div style={{display:"flex",gap:10,marginBottom:8}}>{btnSm(expAll,"Expand All")}{btnSm(colAll,"Collapse All")}</div>
            {attHierarchy.map(b=>{const open=expB.has(b.building);return <div key={b.building} style={{marginBottom:4}}>
              <div onClick={()=>tB(b.building)} style={{display:"flex",alignItems:"center",gap:8,padding:"12px 16px",background:T.surface,border:`1px solid ${T.border}`,borderRadius:6,cursor:"pointer",borderLeft:`3px solid ${T.red}`}} onMouseEnter={e=>e.currentTarget.style.background=T.surfaceAlt} onMouseLeave={e=>e.currentTarget.style.background=T.surface}>
                <span style={{color:T.textDim,fontSize:13,width:14,textAlign:"center",transform:open?"rotate(90deg)":"rotate(0deg)",display:"inline-block",transition:"transform 0.15s"}}>▶</span>
                <span style={{fontWeight:700,fontSize:13,color:T.textBright,minWidth:100}}>{b.building}</span><Badge color={T.red} bg={T.redDim}>{b.total} device{b.total!==1?"s":""}</Badge></div>
              {open&&<div style={{marginLeft:18,borderLeft:`1px solid ${T.border}`}}>{b.rooms.map(r=>{const rk=b.building+"::"+r.room;const ro=expR.has(rk);return <div key={rk}>
                <div onClick={()=>tR(rk)} style={{display:"flex",alignItems:"center",gap:8,padding:"10px 14px",cursor:"pointer",borderRadius:3}} onMouseEnter={e=>e.currentTarget.style.background=T.surfaceAlt} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <span style={{color:T.textDim,fontSize:8,width:12,textAlign:"center",transform:ro?"rotate(90deg)":"rotate(0deg)",display:"inline-block",transition:"transform 0.15s"}}>▶</span>
                  <span style={{fontWeight:600,fontSize:12.5,color:T.text}}>{r.room}</span><span style={{fontSize:13,color:T.textDim,fontFamily:M}}>{r.devices.length} issue{r.devices.length!==1?"s":""}</span></div>
                {ro&&<div style={{marginLeft:14,marginBottom:4}}>{r.devices.map((d,di)=>{const reasons=attReason(d);return <div key={di} style={{display:"flex",alignItems:"center",gap:8,padding:"12px 14px",borderBottom:`1px solid ${T.border}`,fontSize:13}} onMouseEnter={e=>e.currentTarget.style.background=T.surfaceAlt} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <DBadge type={d._type}/>{reasons.map((r,ri)=><Badge key={ri} color={r.color} bg={r.bg}>{r.label}</Badge>)}<DDetail d={d}/><div style={{flex:1}}/><span style={{fontSize:13,color:T.textDim,fontFamily:M,maxWidth:140,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{hostShort(d.host)}</span></div>;})}</div>}
              </div>;})}</div>}</div>;})}
          </div>}
        </div>}

        {/* HIERARCHY */}
        {view==="hierarchy"&&<div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:14}}>
          {hierarchy.map(b=>{const issues=b.total-b.online;const onlinePct=b.total>0?Math.round(b.online/b.total*100):0;return <div key={b.building} style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,cursor:"pointer",transition:"all 0.15s",borderLeft:`4px solid ${issues>0?T.amber:T.green}`}} onClick={()=>{setSelectedBldg(b.building);setExpR(new Set());}} onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="0 4px 16px rgba(0,0,0,0.1)";}} onMouseLeave={e=>{e.currentTarget.style.transform="";e.currentTarget.style.boxShadow="";}}>
            <div style={{padding:"18px 20px"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                <span style={{fontWeight:700,fontSize:18,color:T.textBright,fontFamily:"'EB Garamond',Georgia,serif"}}>{b.building}</span>
                {issues>0&&<span style={{fontSize:13,fontWeight:700,color:"#fff",background:T.red,borderRadius:12,padding:"2px 8px",minWidth:24,textAlign:"center"}}>{issues}</span>}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                <span style={{fontSize:14,color:T.textMuted,fontWeight:500}}>{b.rooms.length} room{b.rooms.length!==1?"s":""}</span>
                <span style={{fontSize:14,color:T.textDim}}>·</span>
                <span style={{fontSize:14,color:onlinePct===100?T.green:T.textMuted,fontWeight:600}}>{b.online}/{b.total}</span>
                <span style={{fontSize:12,color:T.textDim}}>({onlinePct}%)</span>
              </div>
              <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{b.types.map(t=><span key={t} style={{fontSize:16}} title={DTYPES[t]?DTYPES[t].label:""}>{DTYPES[t]?DTYPES[t].icon:""}</span>)}</div>
            </div>
          </div>;})}
          </div>

          {/* LIGHTBOX MODAL */}
          {selectedBldg&&(()=>{
            var b=hierarchy.find(function(x){return x.building===selectedBldg;});
            if(!b)return null;
            var issues=b.total-b.online;
            var onlinePct=b.total>0?Math.round(b.online/b.total*100):0;
            return <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setSelectedBldg(null)}>
              <div style={{position:"absolute",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.5)",backdropFilter:"blur(4px)"}}/>
              <div style={{position:"relative",background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,width:"auto",minWidth:500,maxWidth:"90vw",maxHeight:"90vh",display:"flex",flexDirection:"column",boxShadow:"0 20px 60px rgba(0,0,0,0.3)",overflow:"hidden"}} onClick={function(e){e.stopPropagation();}}>
                {/* Modal Header */}
                <div style={{padding:"24px 28px 16px",borderBottom:`1px solid ${T.border}`,flexShrink:0}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                    <span style={{fontWeight:700,fontSize:24,color:T.textBright,fontFamily:"'EB Garamond',Georgia,serif"}}>{b.building}</span>
                    <span onClick={function(){setSelectedBldg(null);}} style={{fontSize:20,color:T.textMuted,cursor:"pointer",padding:"4px 8px",borderRadius:4}} onMouseEnter={function(e){e.currentTarget.style.background=T.surfaceAlt;}} onMouseLeave={function(e){e.currentTarget.style.background="transparent";}}>✕</span>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                    <span style={{fontSize:15,color:T.textMuted}}>{b.rooms.length} room{b.rooms.length!==1?"s":""}</span>
                    <span style={{fontSize:15,color:onlinePct===100?T.green:issues>0?T.amber:T.textMuted,fontWeight:600}}>{b.online}/{b.total} online ({onlinePct}%)</span>
                    {issues>0&&<Badge color={T.red} bg={T.redDim}>{issues} issue{issues!==1?"s":""}</Badge>}
                    <div style={{display:"flex",gap:4,marginLeft:8}}>{b.types.map(function(t){return <span key={t} style={{fontSize:16}} title={DTYPES[t]?DTYPES[t].label:""}>{DTYPES[t]?DTYPES[t].icon:""}</span>;})}</div>
                  </div>
                </div>
                {/* Modal Body - Rooms */}
                <div style={{flex:1,overflowY:"auto",padding:"8px 0"}}>
                  {b.rooms.map(function(r){var rk=b.building+"::"+r.room;var ro=expR.has(rk);var ri=r.devices.length-r.online;return <div key={rk}>
                    <div onClick={function(){tR(rk);}} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 28px",cursor:"pointer"}} onMouseEnter={function(e){e.currentTarget.style.background=T.surfaceAlt;}} onMouseLeave={function(e){e.currentTarget.style.background="transparent";}}>
                      <span style={{color:T.textDim,fontSize:10,width:12,textAlign:"center",transform:ro?"rotate(90deg)":"rotate(0deg)",display:"inline-block",transition:"transform 0.15s"}}>▶</span>
                      <span style={{fontWeight:700,fontSize:15,color:T.text}}>{r.room}</span>
                      <div style={{display:"flex",gap:3}}>{r.types.map(function(t){return <span key={t} style={{fontSize:14}}>{DTYPES[t]?DTYPES[t].icon:""}</span>;})}</div>
                      <span style={{fontSize:14,color:T.textDim,marginLeft:"auto"}}>{r.online}/{r.devices.length}</span>
                      {ri>0&&<Badge color={T.red} bg={T.redDim}>{ri} err</Badge>}
                    </div>
                    {ro&&<div style={{padding:"0 20px 8px 48px"}}>{r.devices.map(function(d,di){
                  var tf=targetFw[d._type];var hasT=tf&&Array.isArray(tf)&&tf.length>0&&!tf.includes("*");
                  var naC1="N/A (Class 1)";
                  var fwOk=!hasT||d.firmware==="N/A"||d.firmware===naC1||tf.includes(d.firmware);
                  var fwCol=!fwOk&&hasT?T.amber:T.green;
                  return <div key={di} style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",borderBottom:`1px solid ${T.border}`,fontSize:14}} onMouseEnter={function(e){e.currentTarget.style.background=T.surfaceAlt;}} onMouseLeave={function(e){e.currentTarget.style.background="transparent";}}>
                      <DBadge type={d._type}/>
                      <Badge color={stColor(d.status)} bg={d.status==="success"?T.greenDim:d.status==="auth_error"?T.amberDim:T.redDim}>{d.status==="success"?"OK":d.error||d.status}</Badge>
                      <span style={{fontSize:13,color:T.text,fontWeight:500}}>{d.model!=="N/A"?d.model:""}</span>
                      <span style={{fontSize:13,color:T.textMuted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{hostShort(d.host)}</span>
                      {d.serial!=="N/A"&&<span style={{fontSize:12,color:T.textDim}}>{d.serial}</span>}
                      {d.firmware!=="N/A"&&<span style={{fontSize:13,color:fwCol,fontWeight:!fwOk&&hasT?600:500}}>{d.firmware}</span>}
                    </div>;})}</div>}
                  </div>;})}
                </div>
              </div>
            </div>;
          })()}
        </div>}

        {/* TABLE */}
        {view==="table"&&<div style={{display:"flex",flexDirection:"column",flex:1,minHeight:0}}>
          <div style={{flex:1,overflow:"auto",borderRadius:6,border:`1px solid ${T.border}`}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontFamily:S,fontSize:13}}>
            <thead><tr>{[{key:"building",label:"Building"},{key:"room",label:"Room"},{key:"_type",label:"Type"},{key:"host",label:"Host"},{key:"model",label:"Model"},{key:"firmware",label:"Firmware"},{key:"_fwStatus",label:"FW Status"},{key:"status",label:"Status"},{key:"serial",label:"Serial"}].map(col=>
              <th key={col.key} onClick={()=>hSort(col.key)} style={{position:"sticky",top:0,zIndex:2,background:T.surfaceAlt,color:T.textMuted,textAlign:"left",padding:"12px 14px",borderBottom:`2px solid ${T.border}`,cursor:"pointer",userSelect:"none",fontSize:11,textTransform:"uppercase",letterSpacing:1,fontWeight:700,whiteSpace:"nowrap"}}>{col.label}<SA col={col.key}/></th>)}</tr></thead>
            <tbody>{sorted.map((d,i)=>{
              const t=targetFw[d._type];const hasTarget=t&&Array.isArray(t)&&t.length>0&&!t.includes("*");
              const naClass="N/A (Class 1)";
              const fwOk=!hasTarget||d.firmware==="N/A"||d.firmware===naClass||t.includes(d.firmware);
              const fwStatus=d.status!=="success"?"\u2014":!hasTarget?"\u2014":fwOk?"\u2713 OK":"\u26A0 Outdated";
              const fwColor=fwStatus.includes("OK")?T.green:fwStatus.includes("Outdated")?T.amber:T.textDim;
              return <tr key={i} onMouseEnter={e=>{for(const td of e.currentTarget.children)td.style.background=T.surfaceAlt;}} onMouseLeave={e=>{for(const td of e.currentTarget.children)td.style.background="transparent";}}>
              <td style={{padding:"12px 14px",borderBottom:`1px solid ${T.border}`,fontWeight:500,color:T.text}}>{d.building}</td>
              <td style={{padding:"12px 14px",borderBottom:`1px solid ${T.border}`,color:T.textMuted}}>{d.room}</td>
              <td style={{padding:"12px 14px",borderBottom:`1px solid ${T.border}`}}><DBadge type={d._type}/></td>
              <td style={{padding:"12px 14px",borderBottom:`1px solid ${T.border}`,color:T.textMuted,maxWidth:180,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{hostShort(d.host)}</td>
              <td style={{padding:"12px 14px",borderBottom:`1px solid ${T.border}`,color:T.text}}>{d.model!=="N/A"?d.model:"—"}</td>
              <td style={{padding:"12px 14px",borderBottom:`1px solid ${T.border}`,color:!fwOk&&hasTarget&&d.firmware!=="N/A"?T.amber:d.firmware!=="N/A"?T.green:T.textDim,fontWeight:!fwOk&&hasTarget&&d.firmware!=="N/A"?600:400}}>{d.firmware!=="N/A"?d.firmware:"—"}</td>
              <td style={{padding:"12px 14px",borderBottom:`1px solid ${T.border}`,fontWeight:600,color:fwColor}}>{fwStatus}</td>
              <td style={{padding:"12px 14px",borderBottom:`1px solid ${T.border}`}}><Badge color={stColor(d.status)} bg={d.status==="success"?T.greenDim:d.status==="auth_error"?T.amberDim:T.redDim}>{d.status==="success"?"OK":d.error||d.status}</Badge></td>
              <td style={{padding:"12px 14px",borderBottom:`1px solid ${T.border}`,color:T.textDim,fontSize:12}}>{d.serial!=="N/A"?d.serial:"—"}</td></tr>})}</tbody>
          </table>
        </div>
        </div>}

        {/* CHARTS */}
        {view==="charts"&&<div>
          <FwStatusPie devices={allDevs} targetFw={targetFw} large={true}/>
          <div style={{marginTop:16,display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(460px,1fr))",gap:16}}>
          {typeOpts.map(type=>{
            const cfg=DTYPES[type];
            const devsOfType=allDevs.filter(d=>d._type===type);
            const fwMap={};
            devsOfType.forEach(d=>{const fw=d.firmware||"N/A";fwMap[fw]=(fwMap[fw]||0)+1;});
            const fwList=Object.entries(fwMap).sort((a,b)=>b[1]-a[1]);
            const total=devsOfType.length;
            const selected=targetFw[type]||[];
            const hasTarget=Array.isArray(selected)&&selected.length>0&&!selected.includes("*");

            // Build pie slices
            const size=200;const cx=size/2;const cy=size/2;const r=82;
            let startAngle=-90;
            const slices=fwList.map(([fw,count],i)=>{
              const angle=(count/total)*360;
              const endAngle=startAngle+angle;
              const largeArc=angle>180?1:0;
              const rad=d=>d*Math.PI/180;
              const x1=cx+r*Math.cos(rad(startAngle));
              const y1=cy+r*Math.sin(rad(startAngle));
              const x2=cx+r*Math.cos(rad(endAngle));
              const y2=cy+r*Math.sin(rad(endAngle));
              const isAccepted=hasTarget&&selected.includes(fw);
              const naC1="N/A (Class 1)";
              const isOutdated=hasTarget&&!selected.includes(fw)&&fw!=="N/A"&&fw!==naC1;
              const color=isAccepted?T.green:isOutdated?T.amber:CHART_COLORS[i%CHART_COLORS.length];
              const path=angle>=359.9
                ?`M${cx-r},${cy}A${r},${r},0,1,1,${cx+r},${cy}A${r},${r},0,1,1,${cx-r},${cy}`
                :`M${cx},${cy}L${x1},${y1}A${r},${r},0,${largeArc},1,${x2},${y2}Z`;
              startAngle=endAngle;
              return {fw,count,color,path,isAccepted,isOutdated,pct:((count/total)*100).toFixed(0)};
            });

            return <div key={type} style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:8,padding:24}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18}}>
                <span style={{fontSize:22}}>{cfg.icon}</span>
                <span style={{fontSize:20,fontWeight:700,color:T.textBright,fontFamily:"'EB Garamond',Georgia,serif"}}>{cfg.label}s</span>
                <span style={{fontSize:15,color:T.textMuted,fontFamily:S}}>{total} devices</span>
              </div>
              <div style={{display:"flex",gap:20,alignItems:"center"}}>
                <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
                  {slices.map((s,i)=><path key={i} d={s.path} fill={s.color} opacity={0.85} stroke={T.surface} strokeWidth={1.5}/>)}
                  <circle cx={cx} cy={cy} r={42} fill={T.surface}/>
                  <text x={cx} y={cy-4} textAnchor="middle" fill={T.textBright} fontSize={28} fontWeight={700} fontFamily={S}>{total}</text>
                  <text x={cx} y={cy+14} textAnchor="middle" fill={T.textMuted} fontSize={12} fontFamily={S}>devices</text>
                </svg>
                <div style={{flex:1,display:"flex",flexDirection:"column",gap:5}}>
                  {slices.map((s,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{width:12,height:12,borderRadius:3,background:s.color,flexShrink:0}}/>
                    <span style={{fontFamily:S,fontSize:14,color:T.text,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.fw}</span>
                    <span style={{fontFamily:S,fontSize:14,color:T.textMuted,fontWeight:600}}>{s.count}</span>
                    <span style={{fontFamily:S,fontSize:13,color:T.textDim,minWidth:36,textAlign:"right"}}>{s.pct}%</span>
                    {hasTarget&&<span style={{fontSize:14,width:16,textAlign:"center",color:s.isAccepted?T.green:s.isOutdated?T.amber:T.textDim}}>{s.isAccepted?"\u2713":s.isOutdated?"\u26A0":""}</span>}
                  </div>)}
                </div>
              </div>
            </div>;
          })}
        </div>
        </div>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(FleetConsole));
</script>
</body>
</html>
